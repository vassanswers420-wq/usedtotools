<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Market Chart</title>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
  margin:0;
  background:#0f1116;
  color:white;
  font-family:Arial, sans-serif;
}

/* GRID LAYOUT */
.main-layout{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:15px;
  padding:15px;
  height:100vh;
  box-sizing:border-box;
}

.panel{
  background:#111;
  border-radius:12px;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* CHART */
#chart{
  flex:1;
  width:100%;
  position:relative;
}

/* TOOLBAR */
.chart-toolbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

/* SEARCH */
.search-area{
  position:relative;
}

#symbolSearch{
  width:220px;
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #333;
  background:#111;
  color:white;
}

.symbol-results{
  position:absolute;
  top:38px;
  left:0;
  width:220px;
  background:#111;
  border:1px solid #333;
  border-radius:8px;
  display:none;
  max-height:200px;
  overflow-y:auto;
  z-index:9999;
}

.symbol-results div{
  padding:8px 10px;
  cursor:pointer;
}

.symbol-results div:hover{
  background:#222;
}

/* TIMEFRAMES */
.timeframes{
  display:flex;
  gap:6px;
}

.timeframes button{
  background:#1a1d26;
  border:1px solid #333;
  color:#ccc;
  padding:4px 10px;
  border-radius:6px;
  cursor:pointer;
}

.timeframes button:hover{
  background:#2a2e39;
}
           /* red warning color */
.panel{
  background:#111;
  border-radius:12px;
  padding:10px;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow:hidden;   /* required for static effect */
}
/* TV STATIC BACKGROUND */
.tv-static {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.05) 0px,
    rgba(255,255,255,0.05) 1px,
    rgba(0,0,0,0.05) 2px,
    rgba(0,0,0,0.05) 3px
  );
  animation: staticMove 0.15s infinite;
  pointer-events: none;
  z-index: 0;
}

@keyframes staticMove {
  0% { transform: translateY(0); }
  100% { transform: translateY(-3px); }
}

/* Make flashing text appear above static */
.flash-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
}
/* Flashing text centered */
.flash-text {
  color: #ff4c4c;          /* red warning color */
  font-weight: bold;
  font-size: 16px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: flash 1s infinite;
}

@keyframes flash {
  0%, 50%, 100% { opacity: 1; }
  25%, 75% { opacity: 0; }
}

/* Panel title styling */
.panel-title {
  font-weight: bold;
  font-size: 18px;
  margin-bottom: 10px;
}
</style>
</head>

<body>
<div class="main-layout">

<!-- BOX 1 (Chart) -->
<div class="panel">

  <div class="chart-toolbar">

    <!-- LEFT SIDE (SEARCH) -->
    <div class="search-area">
      <input type="text" id="symbolSearch" placeholder="Search symbol">
      <div id="symbolResults" class="symbol-results"></div>
    </div>

    <!-- RIGHT SIDE (TIMEFRAMES) -->
    <div class="timeframes">
      <button data-tf="1">1m</button>
      <button data-tf="5">5m</button>
      <button data-tf="15">15m</button>
      <button data-tf="60">1h</button>
      <button data-tf="D">1D</button>
    </div>

  </div>

  <div id="chart"></div>

</div>

<!-- BOX 2 -->
<div class="panel">
  <div class="tv-static"></div>
  <div class="panel-title">Analytics</div>
  <div class="flash-text">Connection not initiated</div>
</div>

<!-- BOX 3 -->
<div class="panel">
  <div class="tv-static"></div>
  <div class="panel-title">Newz</div>
  <div class="flash-text">Connection not initiated</div>
</div>

<!-- BOX 4 -->
<div class="panel">
  <div class="tv-static"></div>
  <div class="panel-title">ITCs</div>
  <div class="flash-text">Connection not initiated</div>
</div>

</div>

<script>
let currentSymbol = "^NSEI";
let currentTF = 1;
let rawData = [];

const symbols = [
  { name:"NIFTY", symbol:"^NSEI" },
  { name:"BANKNIFTY", symbol:"^NSEBANK" },
  { name:"RELIANCE", symbol:"RELIANCE.NS" },
  { name:"TCS", symbol:"TCS.NS" },
  { name:"HDFCBANK", symbol:"HDFCBANK.NS" },
  { name:"BTC", symbol:"BTC-USD" },
  { name:"ETH", symbol:"ETH-USD" },
  { name:"EURUSD", symbol:"EURUSD=X" },
  { name:"AUDUSD", symbol:"AUDUSD=X" }
];

/* CREATE CHART */
const chart = LightweightCharts.createChart(document.getElementById("chart"), {
  layout: { background:{color:"#0f1116"}, textColor:"#d1d4dc" },
  grid: { vertLines:{color:"#1f2330"}, horzLines:{color:"#1f2330"} }
});
const candleSeries = chart.addCandlestickSeries();

/* CANDLE AGGREGATION */
function aggregateCandles(data, tf){
  if(tf === 1) return data;
  const result = [];
  let bucket = null;
  data.forEach(c => {
    const time = Math.floor(c.time / (tf*60)) * (tf*60);
    if(!bucket || bucket.time !== time){
      if(bucket) result.push(bucket);
      bucket = { time, open:c.open, high:c.high, low:c.low, close:c.close };
    }else{
      bucket.high = Math.max(bucket.high, c.high);
      bucket.low = Math.min(bucket.low, c.low);
      bucket.close = c.close;
    }
  });
  if(bucket) result.push(bucket);
  return result;
}

/* APPLY TIMEFRAME */
function updateTimeframe(){
  let data;
  if(currentTF === "D") data = aggregateCandles(rawData, 1440);
  else data = aggregateCandles(rawData, currentTF);
  candleSeries.setData(data);
  chart.timeScale().fitContent();
    // 👇 Focus on current price (latest candle)
  chart.timeScale().scrollToRealTime();
}

/* LOAD DATA */
async function loadChart(symbol){
  currentSymbol = symbol;
  try{
    const response = await fetch(`https://wild-rice-6da1.vassanswers420.workers.dev/?symbol=${symbol}`);
    rawData = await response.json();
    updateTimeframe();
  }catch(err){
    console.log("Data error", err);
	chart.timeScale().scrollToRealTime(); // 👈 add this too
  }
}

/* SEARCH */
const search = document.getElementById("symbolSearch");
const results = document.getElementById("symbolResults");

search.addEventListener("input", () => {
  const query = search.value.toLowerCase();
  results.innerHTML = "";
  if(query.length === 0){ results.style.display="none"; return; }
  const filtered = symbols.filter(s => s.name.toLowerCase().includes(query));
  filtered.forEach(s => {
    const div = document.createElement("div");
    div.textContent = s.name;
    div.onclick = () => { search.value = s.name; results.style.display="none"; loadChart(s.symbol); };
    results.appendChild(div);
  });
  results.style.display = filtered.length ? "block":"none";
});

/* TIMEFRAME BUTTONS */
document.querySelectorAll(".timeframes button").forEach(btn=>{
  btn.addEventListener("click", () => {
    const tf = btn.dataset.tf;
    currentTF = tf==="D" ? "D" : parseInt(tf);
    updateTimeframe();
  });
});

/* LOAD DEFAULT CHART */
loadChart("^NSEI");
</script>

</body>
</html>
